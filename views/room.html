<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Room {{ROOM_ID}} - Sync YouTube</title>
    <link rel="stylesheet" href="/room.css">
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="/socket.io/socket.io.js"></script>
  </head>
  <body>
    <div id="name-gate" style="position:fixed;inset:0;background:#1a1a1a;z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;">
      <div style="background:#2a2a2a;padding:32px;border-radius:12px;text-align:center;max-width:380px;width:100%;box-shadow:0 0 20px rgba(0,0,0,0.3);">
        <h2 style="margin:0 0 8px;">Enter your name to join</h2>
        <p style="color:#aaa;font-size:13px;margin:0 0 20px;">Room {{ROOM_ID}}</p>
        <input id="gate-name" type="text" placeholder="Your name (leave blank for random)" maxlength="20" autofocus
          style="width:100%;padding:10px;border:none;border-radius:5px;background:#444;color:#fff;font-size:14px;box-sizing:border-box;margin-bottom:10px;">
        <button id="gate-submit"
          style="width:100%;padding:12px;background:#4CAF50;color:#fff;border:none;border-radius:5px;font-size:15px;cursor:pointer;">Join Room</button>
      </div>
    </div>
    <div class="container">
      <div class="top-container">
        <div class="video-area">
          <div class="video-container">
            <div id="player"></div>
          </div>
          <div class="player-controls">
            <button id="mute-btn" onclick="toggleMute()" title="Mute/unmute">🔇</button>
            <input id="volume-slider" type="range" min="0" max="100" value="50" oninput="setVolume(this.value)">
            <span id="volume-value" style="font-size:11px;color:#aaa;width:28px;text-align:right;">50</span>
            <span id="time-display">0:00 / 0:00</span>
          </div>
        </div>
        <div class="sidebar">
          <div class="room-info">
            <span><span class="room-id">{{ROOM_ID}}</span> · <span class="viewers">👥 <span id="viewer-count">{{VIEWER_COUNT}}</span></span></span>
            <button class="copy-link" onclick="copyRoomUrl('{{ROOM_URL}}')">📋 Copy link</button>
          </div>
          <div class="tab-bar">
            <button data-tab="playlist" class="active" onclick="switchTab('playlist')">Playlist</button>
            <button data-tab="users" onclick="switchTab('users')">Users</button>
            <button data-tab="activity" onclick="switchTab('activity')">Activity</button>
          </div>
          <div class="tab-panel active" id="tab-playlist">
            <div class="playlist-header" style="display:flex;justify-content:space-between;align-items:center;gap:5px;flex-wrap:wrap;">
              <div style="display:flex;gap:4px;flex-wrap:wrap;">
                <button id="play-mode-toggle" onclick="togglePlayMode()" style="width:auto;padding:4px 8px;font-size:11px;margin:0;background:#3a7bd5;">Loop</button>
                <button id="auto-delete-toggle" onclick="toggleAutoDelete()" style="width:auto;padding:4px 8px;font-size:11px;margin:0;background:#666;">Auto-del: OFF</button>
                <button onclick="clearPlaylist()" style="width:auto;padding:4px 8px;font-size:11px;margin:0;background:#aa3333;">Clear</button>
              </div>
            </div>
            <div class="playlist" id="playlist"></div>
            <div class="input-button-container">
              <input type="text" id="new-video-url" placeholder="YouTube URL">
              <button onclick="addToPlaylist()">Add</button>
            </div>
          </div>
          <div class="tab-panel" id="tab-users">
            <ul id="connected-users"></ul>
            <div class="name-change-container">
              <input type="text" id="new-name-input" placeholder="Your name" maxlength="20">
              <button onclick="changeName()">Rename</button>
            </div>
          </div>
          <div class="tab-panel" id="tab-activity">
            <div class="activity-log" id="activity-log"></div>
          </div>
        </div>
      </div>
    </div>
    <script>window.RNPKSYNC = { roomId: "{{ROOM_ID}}" };</script>
    <script src="/room.js"></script>
  </body>
</html>
