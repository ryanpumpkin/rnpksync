<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sync YouTube Room</title>
    <link rel="stylesheet" href="/landing.css">
  </head>
  <body>
    <div class="container">
      <h1>Sync YouTube Room</h1>
      {{ERROR_BLOCK}}
      <input type="text" id="name-input" placeholder="Your name" maxlength="20" autofocus>

      <h2>CREATE A NEW ROOM</h2>
      <button onclick="createRoom()">Create Room</button>

      <div class="divider">— OR —</div>

      <h2>JOIN AN EXISTING ROOM</h2>
      <div class="row">
        <input type="text" id="room-id-input" placeholder="Room ID">
        <button class="join" onclick="joinRoom()">Join</button>
      </div>
    </div>
    <script src="/landing.js"></script>
  </body>
</html>
